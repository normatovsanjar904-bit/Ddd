<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AppexMenuBot - Bruno Pizza</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* CSS QISMI */
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #5ce1e6;
            --text-main: #ffffff;
            --text-gray: #94a3b8;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://images.unsplash.com/photo-1513104890138-7c749659a591?auto=format&fit=crop&q=80&w=500');
            background-size: cover;
            background-position: center;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 { margin: 0; font-size: 24px; }
        .header p { color: var(--text-gray); margin: 5px 0 0; font-size: 14px; }

        .promo-banner {
            background: rgba(30, 41, 59, 0.8);
            margin: 15px;
            padding: 12px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-left: 4px solid var(--accent-blue);
        }

        /* Search & Categories */
        .search-container { padding: 0 15px; margin-bottom: 15px; }
        .search-input {
            width: 100%;
            background: var(--card-bg);
            border: none;
            padding: 12px 15px;
            border-radius: 10px;
            color: white;
            box-sizing: border-box;
        }

        .categories {
            display: flex;
            gap: 10px;
            padding: 0 15px 15px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .cat-item {
            background: var(--card-bg);
            padding: 8px 16px;
            border-radius: 20px;
            white-space: nowrap;
            font-size: 14px;
            cursor: pointer;
        }
        .cat-item.active {
            background: rgba(92, 225, 230, 0.2);
            border: 1px solid var(--accent-blue);
        }

        /* Grid System */
        .section-title { padding: 0 15px; font-size: 20px; margin-bottom: 10px; }
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }
        .card img { width: 100%; height: 120px; object-fit: cover; }
        .card-body { padding: 10px; }
        .card-title { font-size: 14px; margin-bottom: 5px; height: 35px; overflow: hidden; }
        .card-price { font-weight: bold; font-size: 16px; color: var(--text-main); }
        
        .add-btn {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: var(--accent-blue);
            color: black;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        /* Cart Footer */
        .cart-footer {
            position: fixed;
            bottom: 20px;
            left: 15px;
            right: 15px;
            background: var(--accent-blue);
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: black;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            display: none; /* Default hidden */
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Бруно Пицца</h1>
        <p>Пн-пт с 11:00 до 23:00</p>
    </div>

    <div class="promo-banner">
        <span>⚡</span>
        <span style="font-size: 12px;">Доставка при заказе свыше 1000 руб бесплатно</span>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Поиск по названию">
    </div>

    <div class="categories">
        <div class="cat-item active">Для Вас 🔥</div>
        <div class="cat-item">Пицца 38 см</div>
        <div class="cat-item">Пицца 30 см</div>
    </div>

    <h2 class="section-title">Для Вас 🔥</h2>
    <div class="product-grid" id="main-grid">
        </div>

    <div class="cart-footer" id="cart-footer" onclick="checkout()">
        <span id="cart-count">Корзина пуста</span>
        <span id="cart-total">0 ₽</span>
    </div>

    <script>
        // JS QISMI
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.MainButton.textColor = "#000000";
        tg.MainButton.color = "#5ce1e6";

        const products = [
            { id: 1, name: "Баварская 30 см", price: 590, img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300" },
            { id: 2, name: "Баварская 38 см", price: 690, img: "https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300" },
            { id: 3, name: "Груша с дор блю", price: 520, img: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=300" },
            { id: 4, name: "Четыре сыра", price: 480, img: "https://images.unsplash.com/photo-1573821663912-569905492939?w=300" }
        ];

        let cart = [];

        function render() {
            const grid = document.getElementById('main-grid');
            grid.innerHTML = products.map(p => `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <div class="card-body">
                        <div class="card-title">${p.name}</div>
                        <div class="card-price">${p.price} ₽</div>
                    </div>
                    <button class="add-btn" onclick="addToCart(${p.id})">+</button>
                </div>
            `).join('');
        }

        window.addToCart = (id) => {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
            tg.HapticFeedback.impactOccurred('medium');
        };

        function updateCart() {
            const footer = document.getElementById('cart-footer');
            const count = document.getElementById('cart-count');
            const total = document.getElementById('cart-total');

            if (cart.length > 0) {
                footer.style.display = 'flex';
                const totalPrice = cart.reduce((sum, p) => sum + p.price, 0);
                count.innerText = `В корзине: ${cart.length} шт.`;
                total.innerText = `${totalPrice} ₽`;
            }
        }

        function checkout() {
            const totalPrice = cart.reduce((sum, p) => sum + p.price, 0);
            const data = {
                items: cart.map(i => i.name),
                total: totalPrice
            };
            tg.sendData(JSON.stringify(data)); // Botga yuborish
        }

        render();
    </script>
</body>
</html>
