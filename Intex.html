<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zamonaviy Online Do'kon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #2563eb;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--light);
            margin: 0;
            padding: 0;
        }

        header {
            background: var(--dark);
            color: white;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .cart-icon {
            cursor: pointer;
            position: relative;
        }

        .cart-count {
            background: red;
            color: white;
            border-radius: 50%;
            padding: 2px 7px;
            font-size: 12px;
            position: absolute;
            top: -10px;
            right: -10px;
        }

        .container {
            padding: 2rem 5%;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            transition: transform 0.3s;
            text-align: center;
        }

        .product-card:hover {
            transform: translateY(-5px);
        }

        .product-card img {
            max-width: 100%;
            border-radius: 8px;
            height: 150px;
            object-fit: cover;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
        }

        /* Savatcha Modali */
        #cart-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
        }
    </style>
</head>
<body>

<header>
    <h2>TechShop</h2>
    <div class="cart-icon" onclick="toggleModal()">
        🛒 Savatcha <span id="count" class="cart-count">0</span>
    </div>
</header>

<div class="container" id="product-list">
    </div>

<div id="cart-modal">
    <div class="modal-content">
        <h3>Sizning savatchangiz</h3>
        <div id="cart-items"></div>
        <h4 id="total-price">Jami: 0 so'm</h4>
        <button class="btn" onclick="checkout()">Buyurtma berish</button>
        <button class="btn" style="background:#64748b; margin-top: 10px;" onclick="toggleModal()">Yopish</button>
    </div>
</div>

<script>
    const products = [
        { id: 1, name: 'iPhone 15 Pro', price: 15000000, img: 'https://picsum.photos/id/160/300/200' },
        { id: 2, name: 'MacBook Air M2', price: 12000000, img: 'https://picsum.photos/id/180/300/200' },
        { id: 3, name: 'AirPods Max', price: 6000000, img: 'https://picsum.photos/id/201/300/200' },
        { id: 4, name: 'Apple Watch', price: 4500000, img: 'https://picsum.photos/id/175/300/200' }
    ];

    let cart = JSON.parse(localStorage.getItem('myCart')) || [];

    function displayProducts() {
        const list = document.getElementById('product-list');
        list.innerHTML = products.map(p => `
            <div class="product-card">
                <img src="${p.img}" alt="${p.name}">
                <h3>${p.name}</h3>
                <p>${p.price.toLocaleString()} so'm</p>
                <button class="btn" onclick="addToCart(${p.id})">Savatchaga qo'shish</button>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const item = products.find(p => p.id === id);
        cart.push(item);
        updateCart();
    }

    function updateCart() {
        localStorage.setItem('myCart', JSON.stringify(cart));
        document.getElementById('count').innerText = cart.length;
        
        const cartDiv = document.getElementById('cart-items');
        cartDiv.innerHTML = cart.map((item, index) => `
            <div class="cart-item">
                <span>${item.name}</span>
                <span>${item.price.toLocaleString()} so'm</span>
            </div>
        `).join('');

        const total = cart.reduce((sum, item) => sum + item.price, 0);
        document.getElementById('total-price').innerText = `Jami: ${total.toLocaleString()} so'm`;
    }

    function toggleModal() {
        const modal = document.getElementById('cart-modal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
    }

    function checkout() {
        if(cart.length === 0) return alert("Savatchangiz bo'sh!");
        alert("Rahmat! Buyurtmangiz qabul qilindi.");
        cart = [];
        updateCart();
        toggleModal();
    }

    // Ishga tushirish
    displayProducts();
    updateCart();
</script>

</body>
</html>
