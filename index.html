<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Magazin | GitHub'da ishlaydi</title>
    <style>
        /* CSS kodlar */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif;
            background: #f0f2f5;
        }
        .header {
            background: #4267B2;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .product {
            background: white;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .product h3 {
            margin: 10px 0;
            color: #333;
        }
        .product .price {
            font-size: 1.3em;
            color: #4267B2;
            font-weight: bold;
        }
        button {
            background: #4267B2;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #365899;
        }
        .cart-info {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛍️ Online Magazin</h1>
        <p>GitHub'da ishlaydigan versiya</p>
    </div>

    <div class="container">
        <!-- Savat ma'lumoti -->
        <div class="cart-info">
            <span>🛒 Savat: <span id="cartCount">0</span> ta mahsulot</span>
            <button onclick="viewCart()" style="width: auto;">Savatni ko'rish</button>
        </div>

        <!-- Mahsulotlar -->
        <div class="products" id="products"></div>
    </div>

    <!-- Savat modal -->
    <div id="cartModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
        <div style="background:white; max-width:500px; margin:50px auto; padding:20px; border-radius:10px;">
            <h2>Savat</h2>
            <div id="cartItems"></div>
            <div id="cartTotal" style="font-size:1.5em; margin:20px 0;"></div>
            <button onclick="checkout()">Buyurtma berish</button>
            <button onclick="closeCart()" style="background:#666;">Yopish</button>
        </div>
    </div>

    <script>
        // Mahsulotlar
        const products = [
            { id: 1, name: "iPhone 14", price: 999, icon: "📱" },
            { id: 2, name: "Samsung S23", price: 899, icon: "📱" },
            { id: 3, name: "MacBook Pro", price: 1999, icon: "💻" },
            { id: 4, name: "AirPods", price: 199, icon: "🎧" }
        ];

        // Savat
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        // Sahifa yuklanganda
        window.onload = function() {
            showProducts();
            updateCartCount();
        };

        // Mahsulotlarni ko'rsatish
        function showProducts() {
            const productsDiv = document.getElementById('products');
            productsDiv.innerHTML = products.map(p => `
                <div class="product">
                    <div style="font-size: 3em; text-align: center;">${p.icon}</div>
                    <h3>${p.name}</h3>
                    <div class="price">$${p.price}</div>
                    <button onclick="addToCart(${p.id})">Savatga qo'shish</button>
                </div>
            `).join('');
        }

        // Savatga qo'shish
        function addToCart(id) {
            const product = products.find(p => p.id === id);
            const existing = cart.find(item => item.id === id);
            
            if(existing) {
                existing.quantity++;
            } else {
                cart.push({...product, quantity: 1});
            }
            
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            alert(product.name + " savatga qo'shildi!");
        }

        // Savat sonini yangilash
        function updateCartCount() {
            const count = cart.reduce((sum, item) => sum + item.quantity, 0);
            document.getElementById('cartCount').textContent = count;
        }

        // Savatni ko'rish
        function viewCart() {
            const modal = document.getElementById('cartModal');
            const itemsDiv = document.getElementById('cartItems');
            
            if(cart.length === 0) {
                itemsDiv.innerHTML = "<p>Savat bo'sh</p>";
            } else {
                itemsDiv.innerHTML = cart.map(item => `
                    <div style="display:flex; justify-content:space-between; margin:10px 0;">
                        <span>${item.name} x${item.quantity}</span>
                        <span>$${item.price * item.quantity}</span>
                    </div>
                `).join('');
            }
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('cartTotal').textContent = `Jami: $${total}`;
            
            modal.style.display = 'block';
        }

        function closeCart() {
            document.getElementById('cartModal').style.display = 'none';
        }

        function checkout() {
            if(cart.length === 0) {
                alert('Savat bo\'sh!');
                return;
            }
            alert('Buyurtma qabul qilindi!');
            cart = [];
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            closeCart();
        }
    </script>
</body>
</html>
