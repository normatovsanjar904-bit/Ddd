<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Online Do'konim</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f4f4f9; color: #333; }
        
        header { 
            background: #2c3e50; color: white; padding: 20px 5%; 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }

        .cart-btn { 
            background: #27ae60; color: white; border: none; 
            padding: 10px 20px; border-radius: 5px; cursor: pointer; 
        }

        .container { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; padding: 40px 5%; 
        }

        .card { 
            background: white; padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; 
        }

        .card h3 { margin: 15px 0; }
        .price { color: #e74c3c; font-weight: bold; font-size: 1.2rem; }

        .add-btn { 
            background: #3498db; color: white; border: none; width: 100%; 
            padding: 10px; margin-top: 15px; border-radius: 5px; cursor: pointer; 
        }

        /* Savatcha Modali */
        #modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; 
        }
        .modal-box { 
            background: white; padding: 30px; border-radius: 10px; width: 400px; max-height: 80vh; overflow-y: auto;
        }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #ccc; }
        .close-btn { background: #7f8c8d; width: 100%; margin-top: 10px; color: white; border: none; padding: 10px; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <h1>Super Do'kon</h1>
    <button class="cart-btn" onclick="openCart()">Savatcha (<span id="count">0</span>)</button>
</header>

<div class="container" id="products"></div>

<div id="modal">
    <div class="modal-box">
        <h2>Sizning savatchangiz</h2>
        <div id="cart-list"></div>
        <h3 id="total" style="margin-top: 20px;">Jami: 0 so'm</h3>
        <button class="add-btn" onclick="order()">Sotib olish</button>
        <button class="close-btn" onclick="closeCart()">Yopish</button>
    </div>
</div>

<script>
    // 1. Ma'lumotlar
    const products = [
        { id: 1, name: "Samsung S24 Ultra", price: 14000000 },
        { id: 2, name: "MacBook Pro M3", price: 22000000 },
        { id: 3, name: "Sony WH-1000XM5", price: 4500000 },
        { id: 4, name: "Apple Watch 9", price: 5000000 }
    ];

    let cart = [];

    // 2. Do'konni chiqarish
    const shopDiv = document.getElementById('products');
    products.forEach(p => {
        shopDiv.innerHTML += `
            <div class="card">
                <div style="background:#ddd; height:150px; border-radius:5px; display:flex; align-items:center; justify-content:center">Rasm</div>
                <h3>${p.name}</h3>
                <p class="price">${p.price.toLocaleString()} so'm</p>
                <button class="add-btn" onclick="addToCart(${p.id})">Savatchaga qo'shish</button>
            </div>
        `;
    });

    // 3. Savatcha mantiqi
    function addToCart(id) {
        const product = products.find(x => x.id === id);
        cart.push(product);
        document.getElementById('count').innerText = cart.length;
        alert(product.name + " qo'shildi!");
    }

    function openCart() {
        const list = document.getElementById('cart-list');
        const total = document.getElementById('total');
        list.innerHTML = "";
        let sum = 0;

        cart.forEach((item, index) => {
            sum += item.price;
            list.innerHTML += `
                <div class="item">
                    <span>${item.name}</span>
                    <b>${item.price.toLocaleString()}</b>
                </div>
            `;
        });

        total.innerText = "Jami: " + sum.toLocaleString() + " so'm";
        document.getElementById('modal').style.display = 'flex';
    }

    function closeCart() {
        document.getElementById('modal').style.display = 'none';
    }

    function order() {
        if(cart.length === 0) return alert("Savatcha bo'sh!");
        alert("Buyurtmangiz qabul qilindi! Tez orada bog'lanamiz.");
        cart = [];
        document.getElementById('count').innerText = 0;
        closeCart();
    }
</script>

</body>
</html>
